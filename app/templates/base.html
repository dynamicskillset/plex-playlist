<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Plex Playlist Generator{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="container">
    <nav>
      <ul>
        <li><strong><a href="/" class="secondary" style="display:inline-flex; align-items:center; gap:0.4rem;">
          <svg width="18" height="18" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="flex-shrink:0;">
            <circle cx="10" cy="10" r="10" fill="#E5A00D"/>
            <path d="M7.5 5.5l7 4.5-7 4.5V5.5z" fill="#1a1a1a"/>
          </svg>
          Plex Playlist Generator
        </a></strong></li>
      </ul>
      <ul>
        <li><a href="/settings" class="secondary">Settings</a></li>
      </ul>
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
